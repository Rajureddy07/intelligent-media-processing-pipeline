<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline Advertisement Intelligence Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-dark bg-primary shadow">

<div class="container-fluid">

<span class="navbar-brand mb-0 h1">

<i class="bi bi-shield-check"></i>

Offline Advertisement Intelligence Platform

</span>

</div>

</nav>

<!-- ================= MAIN ================= -->

<div class="container-fluid mt-3">

<div class="row">

<!-- LEFT PANEL -->

<div class="col-lg-5">

<div class="card shadow">

<div class="card-header">

<h4>

<i class="bi bi-image"></i>

Image Preview

</h4>

</div>

<div class="card-body text-center">

<img

id="preview"

src="https://placehold.co/500x350?text=Upload+Image"

class="img-fluid rounded"

>

</div>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="col-lg-7">

<div class="card shadow">

<div class="card-header">

<h4>

<i class="bi bi-upload"></i>

Upload Advertisement

</h4>

</div>

<div class="card-body">

<div

id="dropArea"

class="drop-area"

>

<i class="bi bi-cloud-arrow-up display-3"></i>

<h4>

Drag & Drop Image

</h4>

<p>

OR

</p>

<input

type="file"

id="imageInput"

accept="image/*"

hidden

>

<button

class="btn btn-primary"

onclick="document.getElementById('imageInput').click()"

>

Choose Image

</button>

</div>

<div class="text-center mt-4">

<button

id="uploadBtn"

class="btn btn-success btn-lg"

>

Analyze Advertisement

</button>

</div>

</div>

</div>

</div>

</div>

<!-- PROGRESS -->

<div class="row mt-3">

<div class="col-12">

<div

id="progressSection"

style="display:none;"

>

<div class="progress">

<div

id="progressBar"

class="progress-bar progress-bar-striped progress-bar-animated"

style="width:10%;"

>

10%

</div>

</div>

</div>

</div>

</div>

<!-- RESULTS -->

<div class="row mt-4">

<div class="col-md-3">

<div class="result-card">

<h6>OCR Text</h6>

<p id="ocrText">-</p>

</div>

</div>

<div class="col-md-3">

<div class="result-card">

<h6>Vehicle Number</h6>

<p id="vehicleNumber">-</p>

</div>

</div>

<div class="col-md-3">

<div class="result-card">

<h6>Blur Score</h6>

<p id="blurScore">-</p>

</div>

</div>

<div class="col-md-3">

<div class="result-card">

<h6>Brightness</h6>

<p id="brightness">-</p>

</div>

</div>

</div>

<div class="row mt-3">

<div class="col-md-3">

<div class="result-card">

<h6>Duplicate</h6>

<p id="duplicate">-</p>

</div>

</div>

<div class="col-md-3">

<div class="result-card">

<h6>Screenshot</h6>

<p id="screenshot">-</p>

</div>

</div>

<div class="col-md-3">

<div class="result-card">

<h6>Metadata</h6>

<p id="metadata">-</p>

</div>

</div>

<div class="col-md-3">

<div class="result-card">

<h6>Confidence</h6>

<h3 id="confidence">

--

</h3>

</div>

</div>

</div>

</div>

<footer>

Developed using Flask • PostgreSQL • OpenCV • EasyOCR

</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
